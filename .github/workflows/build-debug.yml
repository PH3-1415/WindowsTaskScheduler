name: Build Debug

on: [workflow_dispatch]

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install pyinstaller PySide6 APScheduler chardet python-dateutil
    
    - name: Build Debug EXE (with console)
      run: |
        pyinstaller WindowsTaskScheduler.spec --noconfirm
      shell: cmd
    
    - name: Rename to debug version
      run: |
        move dist\WindowsTaskScheduler.exe dist\WindowsTaskScheduler-Debug.exe
      shell: cmd
    
    - uses: actions/upload-artifact@v4
      with:
        name: WindowsTaskScheduler-Debug-EXE
        path: dist\WindowsTaskScheduler-Debug.exe
    
    - uses: actions/upload-artifact@v4
      with:
        name: Build-Warnings
        path: build\WindowsTaskScheduler\warn*.txt
