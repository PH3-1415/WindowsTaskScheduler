name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install PySide6 APScheduler chardet python-dateutil

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name=WindowsTaskScheduler main.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WindowsTaskScheduler-EXE
        path: dist/WindowsTaskScheduler.exe

    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        files: dist/WindowsTaskScheduler.exe
        tag_name: v1.0.0-${{ github.run_number }}
        name: Windows Task Scheduler v1.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}