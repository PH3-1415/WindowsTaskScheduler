name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install PySide6 APScheduler chardet python-dateutil

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name=WindowsTaskScheduler main.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: WindowsTaskScheduler-EXE
        path: dist\WindowsTaskScheduler.exe
        retention-days: 30